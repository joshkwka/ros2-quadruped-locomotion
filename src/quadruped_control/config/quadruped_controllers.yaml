controller_manager:
  ros__parameters:
    update_rate: 100  # 100Hz rate
    controller_manager_timeout: 20.0

    # Broadcaster reports robot's position to RViz
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Joint trajectory controller for all 12 leg joints
    leg_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    use_local_topics: false

leg_controller:
  ros__parameters:
    joints:
      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint
      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint
      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint
      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint

    # Controller sends target positions in radians
    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    # Standard untuned PID gains
    gains:
      FL_hip_joint: {p: 100.0, i: 0.01, d: 1.0}
      FL_thigh_joint: {p: 100.0, i: 0.01, d: 1.0}
      FL_calf_joint: {p: 100.0, i: 0.01, d: 1.0}
      FR_hip_joint: {p: 100.0, i: 0.01, d: 1.0}
      FR_thigh_joint: {p: 100.0, i: 0.01, d: 1.0}
      FR_calf_joint: {p: 100.0, i: 0.01, d: 1.0}
      RL_hip_joint: {p: 100.0, i: 0.01, d: 1.0}
      RL_thigh_joint: {p: 100.0, i: 0.01, d: 1.0}
      RL_calf_joint: {p: 100.0, i: 0.01, d: 1.0}
      RR_hip_joint: {p: 100.0, i: 0.01, d: 1.0}
      RR_thigh_joint: {p: 100.0, i: 0.01, d: 1.0}
      RR_calf_joint: {p: 100.0, i: 0.01, d: 1.0}